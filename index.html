<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trek een bak!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .popup {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 90%;
            border: 4px solid #005A36;
        }
        h1 {
            color: #005A36;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        img {
            max-width: 80%;
            height: auto;
            max-height: 150px;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="popup">
        <h1>Trek een bak! 🍺</h1>
        <!-- Zorg dat de naam hieronder EXACT klopt met je geüploade bestand -->
        <img src="GrolschLogo.png" alt="Grolsch Logo">
    </div>

</body>
</html>
