<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adtje des?</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .popup {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 90%;
            border: 3px solid #005A36; /* Grolsch groen */
        }
        h1 {
            color: #005A36;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .images {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
        }
        img {
            height: 100px;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="popup">
        <h1>Trek een bak! 🍺</h1>
        <div class="images">
            <!-- Vervang deze URL's eventueel door je eigen afbeeldingen -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/23/Grolsch_Logo.png" alt="Grolsch Logo">
        </div>
    </div>

</body>
</html>
